# Enhanced Documentation - Migration Guide
# Migration Guide from v1 to v2

# Overview
# This document provides guidance for migrating from v1 to v2 API endpoints.

# Key Changes
# 1. **Base URL**: Changed from `/endpoint` to `/api/v2/endpoint`
# 2. **RESTful Design**: Proper HTTP methods and resource-based naming
# 3. **Standardized Responses**: Consistent response format across all endpoints
# 4. **English Documentation**: All v2 endpoints documented in English
# 5. **Enhanced Features**: Pagination, filtering, and better error handling

# Endpoint Mapping
# | v1 Endpoint | v2 Endpoint | Method | Notes |
# |--------------|--------------|---------|---------|
# | `/register-product` | `/api/v2/products` | POST | Same functionality, improved validation |
# | `/get-products` | `/api/v2/products` | GET | Added pagination and filtering |
# | `/get-product/{id}` | `/api/v2/products/{id}` | GET | Standardized parameter name |
# | `/update-product/{id}` | `/api/v2/products/{id}` | PUT | Same functionality |
# | `/delete-product/{id}` | `/api/v2/products/{id}` | DELETE | Same functionality |
# | `/register-category` | `/api/v2/categories` | POST | Same functionality |
# | `/getAll-category` | `/api/v2/categories` | GET | Added pagination |
# | `/getById-category/{id}` | `/api/v2/categories/{id}` | GET | Standardized parameter name |
# | `/update-category/{id}` | `/api/v2/categories/{id}` | PUT | Same functionality |
# | `/delete_category/{id}` | `/api/v2/categories/{id}` | DELETE | Same functionality |
# | `/upload-image` | `/api/v2/images/upload` | POST | Same functionality |
# | `/get-image/{fileName}` | `/api/v2/images/{id}` | GET | Changed parameter to ID |
# | `/delete-image` | `/api/v2/images/{id}` | DELETE | Changed parameter to ID |
# | `/estadisticasStockBajo` | `/api/v2/reports/low-stock` | GET | Added pagination and threshold |

# Response Format Changes
# ### v1 Response Format
# ```json
# {
#   "status": "Producto registrado con éxito",
#   // or specific data structure
# }
# ```
# 
# ### v2 Response Format
# ```json
# {
#   "success": true,
#   "message": "Operation completed successfully",
#   "data": {
#     // actual response data
#   },
#   "timestamp": "2024-01-20T15:45:00Z"
# }
# ```

# Authentication
# All v2 endpoints that require authentication use the same JWT bearer token system:
# ```http
# Authorization: Bearer <your-jwt-token>
# ```
# 
# ### Required Roles
# - **Admin Operations**: POST, PUT, DELETE operations require `ADMINISTRADOR` role
# - **Read Operations**: GET operations are generally public (except reports)

# New Features in v2
# 
# ### Pagination
# List endpoints support pagination:
# ```http
# GET /api/v2/products?page=1&limit=10
# ```
# 
# ### Filtering
# Products endpoint supports filtering:
# ```http
# GET /api/v2/products?category=1&min_price=100&max_price=1000&search=laptop
# ```
# 
# ### Enhanced Error Handling
# Consistent error response format:
# ```json
# {
#   "error": "ValidationError",
#   "message": "Invalid input data",
#   "status": 400,
#   "timestamp": "2024-01-20T15:45:00Z"
# }
# ```

# Migration Steps
# 1. **Update Base URLs**: Change all endpoint calls to use `/api/v2/` prefix
# 2. **Update HTTP Methods**: Ensure proper RESTful method usage
# 3. **Handle New Response Format**: Update client code to handle standardized responses
# 4. **Implement Pagination**: Add pagination support for list endpoints
# 5. **Update Error Handling**: Implement consistent error handling
# 6. **Test Thoroughly**: Test all functionality with v2 endpoints

# Timeline
# - **v1 Endpoints**: Available until December 31, 2024
# - **Deprecation Warnings**: All v1 endpoints return deprecation headers
# - **v2 Endpoints**: Immediately available for production use
# - **Support**: Full support provided during migration period

# Support
# For migration assistance, contact:
# - Email: support@tatsoft.com
# - Documentation: https://docs.tatsoft.com/api/v2
# - Examples: Check the API_V2_DOCUMENTATION.md file in repository